<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enter Screen</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #222, #050505);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #f5f5f5;
        display: flex;
        flex-direction: column;
      }

      .status {
        position: absolute;
        top: 1rem;
        left: 1rem;
        font-size: 1rem;
        opacity: 0.9;
        max-width: 60vw;
        line-height: 1.4;
      }

      .center {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 1.5rem;
      }

      .prompt {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }

      .qr-wrapper {
        padding: 1rem 1.5rem;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 1rem;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
      }

      .qr-wrapper img {
        display: block;
        width: 260px;
        height: 260px;
      }

      .hint {
        margin-top: 0.75rem;
        font-size: 0.9rem;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="status" id="status">Waiting for players...</div>
    <div class="center">
      <div class="prompt">Please scan barcode to enter</div>
      <div class="qr-wrapper">
        <img id="qr" alt="Scan to join" />
      </div>
      <div class="hint">Open your camera, scan, and follow the link.</div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const qrImg = document.getElementById("qr");

      // Generate QR code that points to the player controller page on this server
      // If the page is opened as "localhost", force it to use your Wi‑Fi IP instead.
      const configuredIp = "10.100.102.14"; // your Windows Wi‑Fi IP
      const isLocalhost =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";

      const host = isLocalhost ? configuredIp : window.location.hostname;
      const port = window.location.port ? `:${window.location.port}` : "";
      const targetUrl =
        window.location.protocol + "//" + host + port + "/playerController.html";

      const qrApi =
        "https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=" +
        encodeURIComponent(targetUrl);
      qrImg.src = qrApi;

      function renderState(data) {
        const players = data.players || [];
        const result = data.result || "";
        const phase = data.phase || "waitingForPlayers";

        let html = "";

        if (players.length === 0) {
          html += "<strong>Waiting for players (0/2)...</strong>";
        } else {
          html += `<strong>Players (${players.length}/2):</strong><br/>`;
          html += players.map((p) => `• ${p.name}`).join("<br/>");
        }

        html += "<br/><br/>";

        if (phase === "waitingForPlayers") {
          html += "Game status: Waiting for two players to join.";
        } else if (phase === "waitingForChoices") {
          html += "Game status: Waiting for both players to choose.";
        } else if (phase === "showResult") {
          html += "<strong>Result:</strong><br/>" + (result || "Round finished.");
        }

        statusEl.innerHTML = html;
      }

      async function pollPlayerState() {
        try {
          const res = await fetch("/player-state");
          if (res.ok) {
            const data = await res.json();
            renderState(data);
          }
        } catch (e) {
          // Optional: you could show a small "connection lost" note here
        }

        setTimeout(pollPlayerState, 1000);
      }

      pollPlayerState();
    </script>
  </body>
</html>
